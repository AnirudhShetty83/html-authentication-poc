<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">


    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-body">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="dashboard.html">
      <i class="bi bi-shield-lock-fill me-1"></i> AuthApp
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="navbar-nav ms-auto">
          <a class="nav-link text-white" href="dashboard.html">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
          <a class="nav-link text-white" href="forgot-password.html">
            <i class="bi bi-key"></i> Change Password
          </a>
          <a class="nav-link text-white" href="login.html">
            <i class="bi bi-box-arrow-right"></i> Logout
          </a>
        </div>
      </div>
    </div>
  </nav>


  <div class="container py-5">

    <!-- Welcome Banner -->
    <div class="welcome-banner rounded-4 p-5 mb-4 text-white text-center">
      <i class="bi bi-person-circle display-1"></i>
      <h1 class="fw-bold mt-3" style="color: aqua;">Welcome Back</h1>
      <p class="lead">You are now logged in to your account.</p>
    </div>

    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <div class="card dashboard-card text-center p-4 h-100">
          <i class="bi bi-person-check display-5 text-primary mb-3"></i>
          <h5 class="fw-bold">Profile</h5>
          <p class="text-muted">View and edit your profile details</p>
          <a href="" class="btn btn-outline-primary btn-sm mt-auto" style="color: black;">View Profile</a>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card dashboard-card text-center p-4 h-100">
          <i class="bi bi-gear display-5 text-primary mb-3"></i>
          <h5 class="fw-bold">Settings</h5>
          <p class="text-muted">Manage your account settings</p>
          <a href="" class="btn btn-outline-primary btn-sm mt-auto">Go to Settings</a>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card dashboard-card text-center p-4 h-100">
          <i class="bi bi-shield-check display-5 text-primary mb-3" ></i>
          <h5 class="fw-bold">Security </h5>
          <p class="text-muted">Update your password and security</p>
          <a href="forgot-password.html" class="btn btn-outline-primary btn-sm mt-auto">Manage Security</a>
        </div>
      </div>
    </div>

   
    <div class="text-center mt-4">
      <a href="login.html" class="btn btn-danger btn-lg px-5">
        <i class="bi bi-box-arrow-right"></i> Logout
      </a>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="text-center py-3 text-muted small">
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">


    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  
    <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="login.html">
     <i class="bi bi-shield-lock-fill me-1"></i> AuthApp
      </a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link text-white" href="login.html">Login</a>
        <a class="nav-link text-white" href="register.html">Register</a>
        <a class="nav-link text-white" href="dashboard.html">Dashboard</a>
      </div>
    </div>
  </nav>

    <!--  creating box using flex-box -->
  <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
    <div class="card shadow-lg p-4" style="width: 100%; max-width: 460px;">
      <div class="card-body">

        <h2 class="card-title text-center mb-4 fw-bold">
            <!--  used to import  logo using bootstrap -->
          <i class="bi bi-person-plus"></i> Create Account
        </h2>

        <form method="POST" action="#">

          <!-- Name -->
          <div class="mb-3">
            <label for="name" class="form-label">Full Name</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" id="name" name="name"
                     class="form-control" placeholder="Enter your full name" required>
            </div>
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" id="email" name="email"
                     class="form-control" placeholder="Enter your email" required>
            </div>
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="password" name="password"
                     class="form-control" placeholder="Create a password" required>
              <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                <i class="bi bi-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="mb-3">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" id="confirm_password" name="confirm_password"
                     class="form-control" placeholder="Confirm your password" required>
              <button class="btn btn-outline-secondary" type="button" id="toggleConfirm">
                <i class="bi bi-eye" id="eyeIconConfirm"></i>
              </button>
            </div>
          </div>

          <!-- Password Strength -->
          <div class="mb-3">
            <label class="form-label small text-muted">Password Strength</label>
            <div class="progress" style="height: 6px;">
              <div class="progress-bar" id="strengthBar"
                   role="progressbar" style="width: 0%"></div>
            </div>
            <small id="strengthText" class="text-muted"></small>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-person-check"></i> Register
            </button>
          </div>

        </form>

        <hr>
        <p class="text-center">
          Already have an account? <a href="login.html">Login here</a>
        </p>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Password 
      // toggle password
      
    document.getElementById('togglePassword').addEventListener('click', function () {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
      } else {
        pwd.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
      }
    });

  </script>

</body>
</html>

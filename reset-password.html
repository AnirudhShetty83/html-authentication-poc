<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

<!-- Bootstrap 5 link  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">


    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- navigation bar  -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="login.html">
   <i class="bi bi-shield-lock-fill me-1"></i> AuthApp
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="navbar-nav ms-auto">
          <a class="nav-link text-white" href="login.html">
            <i class="bi bi-house"></i> Home
          </a>
          <a class="nav-link text-white" href="register.html">
            <i class="bi bi-person-plus"></i> Register
          </a>
          <a class="nav-link text-white" href="dashboard.html">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </div>
      </div>
    </div>
  </nav>

<!-- creating container   -->
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4" style="width: 100%; max-width: 420px;">
      <div class="card-body">

        <!-- Icon at top -->
        <div class="text-center mb-4">
          <div class="icon-circle mx-auto mb-3">
            <i class="bi bi-lock-fill display-5 text-primary"></i>
          </div>
          <h2 class="fw-bold">Reset Password</h2>
          <p class="text-muted small">
            Enter your new password below. Make sure it's strong and secure.
          </p>
        </div>

<form method="GET" action="login.html">

    <!-- create new password  -->
          <div class="mb-3">
            <label for="new_password" class="form-label">New Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="new_password" name="new_password"
                     class="form-control" placeholder="Enter new password" required>
              <button class="btn btn-outline-secondary" type="button" id="toggleNew">
                <i class="bi bi-eye" id="eyeNew"></i>
              </button>
            </div>
          </div>
<!-- confirming new password  -->
    
          <div class="mb-3">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" id="confirm_password" name="confirm_password"
                     class="form-control" placeholder="Confirm new password" required>
              <button class="btn btn-outline-secondary" type="button" id="toggleConfirm">
                <i class="bi bi-eye" id="eyeConfirm"></i>
              </button>
            </div>
          </div>

      
          <small id="matchMessage" class="d-block mb-3"></small>
<!-- pasword strength ui  -->

          <div class="mb-3">
            <label class="form-label small text-muted">Password Strength</label>
            <div class="progress" style="height: 6px;">
              <div class="progress-bar" id="strengthBar"
                   role="progressbar" style="width: 0%"></div>
            </div>
            <small id="strengthText" class="text-muted"></small>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
              <i class="bi bi-check-circle"></i> Update Password
            </button>
          </div>

        </form>

        <hr>
        <p class="text-center">
          <a href="login.html">
            <i class="bi bi-arrow-left"></i> Back to Login
          </a>
        </p>

      </div>
    </div>
  </div>

<!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

 
</body>
</html>

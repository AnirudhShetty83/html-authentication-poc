<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
   <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand fw-bold" href="login.html">
        <i class="bi bi-shield-lock-fill me-1"></i> AuthApp
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="login.html">Login</a>
          <a class="nav-link" href="register.html">Register</a>
          <a class="nav-link" href="dashboard.html">Dashboard</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- LOGIN CARD -->
  <div class="login-wrapper">
    <div class="login-card">

      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your account to continue</p>

      <form method="POST" action="#">

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" name="email"
                 class="form-control" placeholder="Email Address" required>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">
            <input type="password" id="password" name="password"
                   class="form-control" placeholder="Password 8-16 characters"
                   style="border-radius:12px; border-right: none;" required>
            <button class="btn" type="button" id="togglePwd"
                    style="border: 1.5px solid #e5e7eb; border-left:none; border-radius:0 12px 12px 0; background:rgba(56, 51, 51, 0.8);">
              <i class="bi bi-eye-slash" id="eyeIcon" style="color:#9ca3af"></i>
            </button>
          </div>
        </div>

        <div class="remember-row">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-signin">Sign in</button>

      </form>

      <div class="divider">or</div>

      <div class="bottom-text">
        Don't have an account? <a href="register.html">Register here</a>
      </div>

    </div>
  </div>
   <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- toggle password -->
  <script>
    document.getElementById('togglePwd').addEventListener('click', function () {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
      } else {
        pwd.type = 'password';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
      }
    });
  </script>

</body>
</html>

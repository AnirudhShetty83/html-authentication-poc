<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="login.html">
        <i class="bi bi-shield-lock"></i> AuthApp
      </a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link text-white" href="login.html">Login</a>
        <a class="nav-link text-white" href="register.html">Register</a>
        <a class="nav-link text-white" href="dashboard.html">Dashboard</a>
      </div>
    </div>
  </nav>

  <!-- LOGIN CARD -->
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4" style="width: 100%; max-width: 420px;">
      <div class="card-body">
        <h2 class="card-title text-center mb-4 fw-bold">
          <i class="bi bi-person-circle"></i> Login
        </h2>

        <form method="POST" action="#">
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email"
                   class="form-control" placeholder="Enter your email" required>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password"
                   class="form-control" placeholder="Enter your password" required>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">Login</button>
          </div>
        </form>

        <hr>
        <p class="text-center mb-1">
          <a href="forgot-password.html">Forgot your password?</a>
        </p>
        <p class="text-center">
          Don't have an account? <a href="register.html">Register here</a>
        </p>

      </div>
    </div>
  </div>

</body>

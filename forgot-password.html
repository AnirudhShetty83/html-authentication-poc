<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="login.html">
          <i class="bi bi-shield-lock-fill me-1"></i> AuthApp
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="navbar-nav ms-auto">
          <a class="nav-link text-white" href="login.html">
            <i class="bi bi-house"></i> Home
          </a>
          <a class="nav-link text-white" href="register.html">
            <i class="bi bi-person-plus"></i> Register
          </a>
          <a class="nav-link text-white" href="dashboard.html">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- FORGOT PASSWORD CARD -->
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4" style="width: 100%; max-width: 420px;">
      <div class="card-body">

        <!-- Icon at top -->
        <div class="text-center mb-4">
          <div class="icon-circle mx-auto mb-3">
            <i class="bi bi-envelope-paper display-5 text-primary"></i>
          </div>
          <h2 class="fw-bold">Forgot Password?</h2>
          <p class="text-muted small">
            Enter your email address and we'll send you a link to reset your password.
          </p>
        </div>

        <!-- Form -->
        <form method="GET" action="reset-password.html">

          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" id="email" name="email"
                     class="form-control" placeholder="Enter your email" required>
            </div>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-send"></i> Send Reset Link
            </button>
          </div>

        </form>

        <hr>

        <p class="text-center mb-1">
          <a href="login.html">
            <i class="bi bi-arrow-left"></i> Back to Login
          </a>
        </p>
        <p class="text-center">
          Don't have an account? <a href="register.html">Register here</a>
        </p>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
